x-bun-build-args: &bun-build-args
  BUN_VERSION: ${BUN_VERSION:-1.3.13}
  BUN_DISTRO: ${BUN_DISTRO:-debian13}

x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true

x-logging-defaults: &logging-defaults
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # Traefik - Modern reverse proxy and load balancer
  traefik:
    <<:
      - *security-defaults
      - *logging-defaults
    image: ${TRAEFIK_IMAGE:-dhi.io/traefik:3.6.13-debian13@sha256:a6949d480ceb9c02632c56999ecad67526004cde386b0857deb2b31fe2a57e2a}
    container_name: chat-app-traefik
    command:
      # API and Dashboard
      - --api.dashboard=true

      # Docker provider
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=chat-app-internal

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true

      # Logging
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
      - --accesslog=true

      # Ping for healthcheck
      - --ping=true

      # Metrics
      - --metrics.prometheus=true
      - --metrics.prometheus.addentrypointslabels=true
      - --metrics.prometheus.addserviceslabels=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_logs:/var/log/traefik
    labels:
      - "traefik.enable=true"
      # Dashboard router (HTTPS only)
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      # Dashboard security (optional - uncomment and configure if needed)
      # - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      # - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$apr1$$..."
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chat-app-network

  db:
    <<:
      - *security-defaults
      - *logging-defaults
    image: ${POSTGRES_IMAGE:-dhi.io/postgres:18.3-debian13}
    container_name: chat-app-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums --wal-segsize=64"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      -c shared_buffers=256MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.7
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=8MB
      -c max_connections=100
    networks:
      - chat-app-network

  # Redis cache with optimizations
  redis:
    <<:
      - *security-defaults
      - *logging-defaults
    image: ${REDIS_IMAGE:-dhi.io/redis:8.6.2-debian13}
    container_name: chat-app-redis
    environment:
      REDISCLI_AUTH: ${REDIS_AUTH:-redis_password}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - redis_config:/usr/local/etc/redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      redis-server
      --requirepass ${REDIS_AUTH:-redis_password}
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 300
      --timeout 0
      --save 900 1 300 10 60 10000
    networks:
      - chat-app-network

  # Database migration service
  migrate:
    <<: *security-defaults
    build:
      context: .
      dockerfile: ./server/Dockerfile.migrate
      args:
        <<: *bun-build-args
    container_name: chat-app-migrate
    init: true
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - chat-app-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Frontend client application
  client:
    <<:
      - *security-defaults
      - *logging-defaults
    build:
      context: .
      dockerfile: Dockerfile
      target: client-prod
      args:
        <<: *bun-build-args
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-Chat App}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_DEV_MODE: ${VITE_DEV_MODE:-false}
    container_name: chat-app-client
    environment:
      - NODE_ENV=production
      - BASE_API_SLUG=${BASE_API_SLUG:-api}
      - SERVER_HOST=server
      - SERVER_PORT=${SERVER_PORT:-3000}
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      server:
        condition: service_healthy
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      - "traefik.docker.network=chat-app-internal"

      # HTTPS router (primary)
      - "traefik.http.routers.app-secure.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.app-secure.entrypoints=websecure"
      - "traefik.http.routers.app-secure.tls=true"
      - "traefik.http.routers.app-secure.middlewares=app-compress,security-headers"

      # Service configuration
      - "traefik.http.services.app.loadbalancer.server.port=80"
      - "traefik.http.services.app.loadbalancer.healthcheck.path=/"
      - "traefik.http.services.app.loadbalancer.healthcheck.interval=30s"

      # Compression middleware
      - "traefik.http.middlewares.app-compress.compress=true"

      # Security headers middleware
      - "traefik.http.middlewares.security-headers.headers.framedeny=true"
      - "traefik.http.middlewares.security-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.security-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.security-headers.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stspreload=true"
      - "traefik.http.middlewares.security-headers.headers.stsseconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.referrerpolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.permissionspolicy=camera=(), microphone=(), geolocation=(), interest-cohort=()"
    networks:
      - chat-app-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  # Backend API server
  server:
    <<: *security-defaults
    build:
      context: .
      dockerfile: Dockerfile
      target: server-prod
      args:
        <<: *bun-build-args
    container_name: chat-app-server
    init: true
    environment:
      - NODE_ENV=production
      - SERVER_PORT=${SERVER_PORT:-3000}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME:-token}
      - BASE_API_SLUG=${BASE_API_SLUG:-api}
      - CLIENT_URL=${CLIENT_URL}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - DB_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_AUTH:-redis_password}@redis:6379}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_OVERRIDES=${OPENAI_MODEL_OVERRIDES:-}
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - LANGFUSE_BASEURL=${LANGFUSE_BASEURL:-https://cloud.langfuse.com}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-${LANGFUSE_BASEURL:-https://cloud.langfuse.com}}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    expose:
      - "${SERVER_PORT:-3000}"
    volumes:
      - server_logs:/app/logs
      - server_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:'+(process.env.SERVER_PORT||'3000')+'/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      - "traefik.docker.network=chat-app-internal"

      # HTTPS router (primary)
      - "traefik.http.routers.api-secure.rule=Host(`${DOMAIN}`) && PathPrefix(`/${BASE_API_SLUG}`)"
      - "traefik.http.routers.api-secure.entrypoints=websecure"
      - "traefik.http.routers.api-secure.tls=true"
      - "traefik.http.routers.api-secure.middlewares=api-cors,api-ratelimit,api-compress,security-headers"

      # Service configuration
      - "traefik.http.services.api.loadbalancer.server.port=${SERVER_PORT:-3000}"
      - "traefik.http.services.api.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.api.loadbalancer.healthcheck.interval=30s"

      # Sticky sessions for stateful connections
      - "traefik.http.services.api.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.api.loadbalancer.sticky.cookie.name=server_sticky"
      - "traefik.http.services.api.loadbalancer.sticky.cookie.secure=true"
      - "traefik.http.services.api.loadbalancer.sticky.cookie.httpOnly=true"

      # CORS middleware
      - "traefik.http.middlewares.api-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolalloworiginlist=https://${DOMAIN},${CLIENT_URL}"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.api-cors.headers.accesscontrolallowcredentials=true"

      # Rate limiting middleware
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=200"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.period=1m"

      # Compression middleware
      - "traefik.http.middlewares.api-compress.compress=true"

      # Security headers middleware (shared with client)
      - "traefik.http.middlewares.security-headers.headers.framedeny=true"
      - "traefik.http.middlewares.security-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.security-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.security-headers.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stspreload=true"
      - "traefik.http.middlewares.security-headers.headers.stsseconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.referrerpolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.permissionspolicy=camera=(), microphone=(), geolocation=(), interest-cohort=()"
    networks:
      - chat-app-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

networks:
  # Internal network for application services
  chat-app-network:
    name: chat-app-internal
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # Database volumes
  postgres_data:
    name: chat-app-postgres-data
  postgres_backups:
    name: chat-app-postgres-backups

  # Cache volumes
  redis_data:
    name: chat-app-redis-data
  redis_config:
    name: chat-app-redis-config

  # Application volumes
  server_logs:
    name: chat-app-server-logs
  server_uploads:
    name: chat-app-server-uploads

  # Traefik volumes
  traefik_logs:
    name: chat-app-traefik-logs
