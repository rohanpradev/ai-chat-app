name: Sonar

on:
  push:
    branches: [main, develop, next]
  pull_request:
    branches: [main, develop, next]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonar-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.12

jobs:
  scan:
    name: Sonar Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Sonar configuration
        id: sonar
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Sonar scan because SONAR_TOKEN is not configured."
            exit 0
          fi

          project_key="${SONAR_PROJECT_KEY:-ai-chat-app}"
          host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"

          if [ "${host_url}" = "https://sonarcloud.io" ] && [ -z "${SONAR_ORGANIZATION:-}" ]; then
            echo "::error::SONAR_ORGANIZATION repository variable is required for SonarCloud analysis."
            exit 1
          fi

          {
            echo "enabled=true"
            echo "project_key=${project_key}"
            echo "host_url=${host_url}"
            echo "args<<EOF"
            echo "-Dsonar.projectKey=${project_key}"
            echo "-Dsonar.host.url=${host_url}"
            if [ -n "${SONAR_ORGANIZATION:-}" ]; then
              echo "-Dsonar.organization=${SONAR_ORGANIZATION}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        if: steps.sonar.outputs.enabled == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        if: steps.sonar.outputs.enabled == 'true'
        run: bun install --frozen-lockfile

      - name: Generate client coverage
        if: steps.sonar.outputs.enabled == 'true'
        run: cd client && bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Generate server coverage
        if: steps.sonar.outputs.enabled == 'true'
        run: cd server && bun test --preload ./src/test/setup-env.ts --coverage --coverage-reporter=lcov --coverage-dir=coverage ./src

      - name: SonarQube Scan
        if: steps.sonar.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        with:
          args: ${{ steps.sonar.outputs.args }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
