name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_to_aks:
        description: 'Deploy to AKS (true/false)'
        required: false
        default: false
        type: boolean
      skip_tests:
        description: 'Skip tests (true/false)'
        required: false
        default: false
        type: boolean

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
  CONTAINER_NAME: ai-chat-app
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  CLUSTER_NAME: ${{ vars.CLUSTER_NAME }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}

permissions:
  id-token: write
  contents: read
  security-events: write
  actions: read

jobs:
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: bun install
    
    - name: Run Biome linting and formatting
      continue-on-error: true
      run: |
        bun run lint || echo "Biome linting found issues"
        bun run check || echo "Biome formatting issues found"
    
    - name: Run SonarQube Scanner
      if: github.event_name != 'pull_request'
      continue-on-error: true
      uses: sonarsource/sonarqube-scan-action@v3.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: 'https://sonarcloud.io'
    
    - name: SonarQube Quality Gate
      if: github.event_name != 'pull_request'
      continue-on-error: true
      uses: sonarsource/sonarqube-quality-gate-action@master
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        
    - name: Initialize CodeQL
      if: ${{ !inputs.skip_tests }}
      uses: github/codeql-action/init@v3
      continue-on-error: true
      with:
        languages: javascript-typescript
        queries: security-extended,security-and-quality
        
    - name: Build CodeQL
      if: ${{ !inputs.skip_tests }}
      run: |
        bun run build
        
    - name: Perform CodeQL Analysis
      if: ${{ !inputs.skip_tests }}
      uses: github/codeql-action/analyze@v3
      continue-on-error: true
      with:
        category: "/language:javascript-typescript"
        wait-for-processing: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    if: ${{ !inputs.skip_tests && (always() && (needs.code-quality.result == 'success' || needs.code-quality.result == 'skipped')) }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: bun install
    
    - name: Setup test services
      run: |
        docker compose -f compose.yml up -d db redis
        
    - name: Wait for PostgreSQL
      run: |
        RETRIES=30
        until docker compose -f compose.yml exec -T db pg_isready || [ $RETRIES -eq 0 ]; do
          echo "Waiting for PostgreSQL to be ready... ($RETRIES retries left)"
          RETRIES=$((RETRIES-1))
          sleep 1
        done
        
    - name: Wait for Redis
      run: |
        RETRIES=30
        until docker compose -f compose.yml exec -T redis redis-cli ping || [ $RETRIES -eq 0 ]; do
          echo "Waiting for Redis to be ready... ($RETRIES retries left)"
          RETRIES=$((RETRIES-1))
          sleep 1
        done

    - name: Run server tests with coverage
      continue-on-error: true
      run: |
        cd server
        export DATABASE_URL="postgres://postgres:postgres@localhost:5432/postgres"
        export JWT_SECRET="test-secret-32-chars-minimum-here"
        export CLIENT_URL="http://localhost:3000"
        export REDIS_URL="redis://localhost:6379"
        bun test --coverage || echo "Server tests failed but continuing..."
    
    - name: Run client tests with coverage
      continue-on-error: true
      run: |
        cd client
        bun test --coverage || echo "Client tests failed but continuing..."
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      continue-on-error: true
      with:
        files: ./server/coverage/lcov.info,./client/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build and Scan Image
    runs-on: ubuntu-latest
    needs: [code-quality, test]
    if: ${{ always() && ((inputs.skip_tests && (needs.code-quality.result == 'success' || needs.code-quality.result == 'skipped')) || ((needs.test.result == 'success' || needs.test.result == 'skipped') && (needs.code-quality.result == 'success' || needs.code-quality.result == 'skipped'))) }}
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.build.outputs.image-tag }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Azure OIDC Login
      uses: azure/login@v2
      with:
        client-id: ${{ env.AZURE_CLIENT_ID }}
        tenant-id: ${{ env.AZURE_TENANT_ID }}
        subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
    
    - name: Get secrets from Key Vault
      continue-on-error: true
      run: |
        if [ -n "${{ env.KEY_VAULT_NAME }}" ] && az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name container-registry-name >/dev/null 2>&1; then
          REGISTRY_NAME=$(az keyvault secret show --vault-name ${{ env.KEY_VAULT_NAME }} --name container-registry-name --query value -o tsv)
          echo "REGISTRY_NAME=$REGISTRY_NAME" >> $GITHUB_ENV
        else
          echo "REGISTRY_NAME=${{ env.AZURE_CONTAINER_REGISTRY }}" >> $GITHUB_ENV
        fi
    
    - name: Login to ACR
      run: |
        REGISTRY=$(echo "${{ env.REGISTRY_NAME || env.AZURE_CONTAINER_REGISTRY }}" | sed 's/.azurecr.io//')
        az acr login --name $REGISTRY
    
    - name: Build Docker image
      id: build
      run: |
        REGISTRY="${{ env.REGISTRY_NAME || env.AZURE_CONTAINER_REGISTRY }}"
        IMAGE_TAG="${REGISTRY}/${{ env.CONTAINER_NAME }}:${{ github.sha }}"
        LATEST_TAG="${REGISTRY}/${{ env.CONTAINER_NAME }}:latest"
        
        docker build -t $IMAGE_TAG .
        docker push $IMAGE_TAG
        docker tag $IMAGE_TAG $LATEST_TAG
        docker push $LATEST_TAG
        
        DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_TAG 2>/dev/null || echo "")
        echo "digest=$DIGEST" >> $GITHUB_OUTPUT
        echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.28.0
      continue-on-error: true
      with:
        image-ref: '${{ steps.build.outputs.image-tag }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      continue-on-error: true
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        category: 'trivy'
    
    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/docker@master
      continue-on-error: true
      if: env.SNYK_TOKEN != ''
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        image: '${{ steps.build.outputs.image-tag }}'
        args: --severity-threshold=high --file=Dockerfile

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() && 
      needs.build.result == 'success' && 
      inputs.deploy_to_aks == true
    
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Azure OIDC Login
      uses: azure/login@v2
      with:
        client-id: ${{ env.AZURE_CLIENT_ID }}
        tenant-id: ${{ env.AZURE_TENANT_ID }}
        subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'
    
    - name: Get AKS credentials
      continue-on-error: true
      run: |
        az aks get-credentials --resource-group ${{ env.RESOURCE_GROUP }} --name ${{ env.CLUSTER_NAME }} || {
          echo "Failed to get AKS credentials, skipping deployment"
          exit 0
        }
    
    - name: Deploy to AKS
      continue-on-error: true
      run: |
        if ! kubectl get namespace ai-chat-app >/dev/null 2>&1; then
          echo "Namespace ai-chat-app not found, creating..."
          kubectl create namespace ai-chat-app || echo "Failed to create namespace"
        fi
        
        REGISTRY="${{ env.REGISTRY_NAME || env.AZURE_CONTAINER_REGISTRY }}"
        IMAGE_TAG="${REGISTRY}/${{ env.CONTAINER_NAME }}:${{ github.sha }}"
        kubectl set image deployment/ai-chat-app ai-chat-app=$IMAGE_TAG -n ai-chat-app || {
          echo "Deployment failed, but continuing..."
          exit 0
        }
        
        kubectl rollout status deployment/ai-chat-app -n ai-chat-app --timeout=300s || {
          echo "Rollout timeout, but deployment may still succeed"
        }
        
        kubectl get pods -n ai-chat-app || echo "Failed to get pods status"
    
    - name: Health check
      continue-on-error: true
      run: |
        SERVICE_IP=$(kubectl get service ai-chat-service -n ai-chat-app -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
        if [ -n "$SERVICE_IP" ]; then
          curl -f http://$SERVICE_IP/health || echo "Health check failed"
        else
          echo "Service IP not available for health check"
        fi