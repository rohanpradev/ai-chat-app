name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        
      - name: Lint code
        run: bun check
        
      - name: Type check
        run: |
          cd client && bunx tsc --noEmit
          cd ../server && bunx tsc --noEmit
          
      - name: Run tests
        run: bun test
        continue-on-error: true

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        
      - name: Build client
        run: cd client && bun run build

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        
      - name: Build check (no explicit build for Bun)
        run: cd server && bunx tsc --noEmit

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [build-client, build-server]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build server image
        run: docker build -t ai-chat-app-server:latest --target server-prod .
        
      - name: Build client image
        run: docker build -t ai-chat-app-client:latest --target client-prod .
        
      - name: Build migrate image
        run: docker build -t ai-chat-app-migrate:latest -f server/Dockerfile.migrate .
        
      - name: Test Docker Compose
        run: |
          # Create minimal .env for testing
          cat > .env << EOF
          AZURE_API_KEY=test_key
          AZURE_RESOURCE_NAME=test_resource
          JWT_SECRET=test_secret_min_32_characters_long
          DB_PASSWORD=postgres
          DB_USER=postgres
          LANGFUSE_SECRET_KEY=
          LANGFUSE_PUBLIC_KEY=
          EOF
          # Validate compose file
          docker compose config > /dev/null
          echo "✅ Docker Compose configuration is valid"