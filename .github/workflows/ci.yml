name: CI

on:
  schedule:
    - cron: "21 4 * * 1"
  push:
    branches: [main, develop, next]
  pull_request:
    branches: [main, develop, next]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Audit dependencies
        run: bun run security:check

      - name: Lint code
        run: bun run lint

      - name: Run Knip
        run: bun run knip

      - name: Check Drizzle migrations
        run: |
          set -euo pipefail
          cd server
          DB_URL=postgres://postgres:postgres@localhost:5432/chatapp bun run db:generate
          git diff --exit-code -- src/db/drizzle

      - name: Type check with tsgo
        run: bun run typecheck

      - name: Run tests
        run: |
          set -euo pipefail
          (cd client && bun run test)
          (cd server && bun run test)

  validate-kubernetes:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          SERVER_PORT=3000
          NODE_ENV=production
          LOG_LEVEL=info
          DB_PASSWORD=postgres
          DB_USER=postgres
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=chatapp
          DB_URL=postgres://postgres:postgres@db:5432/chatapp
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_AUTH=redis_password
          REDIS_URL=redis://:redis_password@redis:6379
          OPENAI_API_KEY=test-openai-key
          SERPER_API_KEY=
          LANGFUSE_SECRET_KEY=
          LANGFUSE_PUBLIC_KEY=
          LANGFUSE_BASEURL=
          JWT_SECRET=test_secret_min_32_characters_long
          CLIENT_URL=http://localhost
          BASE_API_SLUG=api
          VITE_API_URL=/api
          VITE_DEV_MODE=false
          VITE_APP_NAME=Chat App
          VITE_APP_VERSION=1.0.0
          DOMAIN=localhost
          TRAEFIK_LOG_LEVEL=INFO
          EOF

      - name: Validate Kubernetes chart
        run: bun run k8s:validate

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build client and report asset sizes
        run: cd client && bun run build:report

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build check (no explicit build for Bun)
        run: bun run --filter @chat-app/server typecheck

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [build-client, build-server, validate-kubernetes]
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          SERVER_PORT=3000
          NODE_ENV=production
          LOG_LEVEL=info
          DB_PASSWORD=postgres
          DB_USER=postgres
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=chatapp
          DB_URL=postgres://postgres:postgres@db:5432/chatapp
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_AUTH=redis_password
          REDIS_URL=redis://:redis_password@redis:6379
          OPENAI_API_KEY=test-openai-key
          SERPER_API_KEY=
          LANGFUSE_SECRET_KEY=
          LANGFUSE_PUBLIC_KEY=
          LANGFUSE_BASEURL=
          JWT_SECRET=test_secret_min_32_characters_long
          CLIENT_URL=http://localhost
          BASE_API_SLUG=api
          VITE_API_URL=/api
          VITE_DEV_MODE=false
          VITE_APP_NAME=Chat App
          VITE_APP_VERSION=1.0.0
          DOMAIN=localhost
          TRAEFIK_LOG_LEVEL=INFO
          EOF

      - name: Detect DHI credentials
        id: dhi
        run: |
          set -euo pipefail
          if [ -n "${DOCKER_USERNAME:-}" ] && [ -n "${DOCKER_PASSWORD:-}" ]; then
            echo "::add-mask::${DOCKER_USERNAME}"
            echo "::add-mask::${DOCKER_PASSWORD}"
            {
              echo "enabled=true"
              echo "username=${DOCKER_USERNAME}"
              echo "password=${DOCKER_PASSWORD}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to DHI registry
        if: steps.dhi.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ steps.dhi.outputs.username }}
          password: ${{ steps.dhi.outputs.password }}

      - name: Build server image (DHI)
        if: steps.dhi.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: server-prod
          pull: true
          load: true
          tags: chat-app-server:latest
          build-args: |
            BUN_VERSION=${{ env.BUN_VERSION }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build client image (DHI)
        if: steps.dhi.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: client-prod
          pull: true
          load: true
          tags: chat-app-client:latest
          build-args: |
            BUN_VERSION=${{ env.BUN_VERSION }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

      - name: Build migrate image (DHI)
        if: steps.dhi.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile.migrate
          pull: true
          load: true
          tags: chat-app-migrate:latest
          build-args: |
            BUN_VERSION=${{ env.BUN_VERSION }}
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,scope=migrate,mode=max

      - name: Build server image (fallback)
        if: steps.dhi.outputs.enabled != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: server-prod
          pull: true
          load: true
          tags: chat-app-server:latest
          build-args: |
            BUN_DEV_IMAGE=oven/bun:${{ env.BUN_VERSION }}-alpine
            BUN_RUNTIME_IMAGE=oven/bun:${{ env.BUN_VERSION }}-alpine
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build client image (fallback)
        if: steps.dhi.outputs.enabled != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: client-prod
          pull: true
          load: true
          tags: chat-app-client:latest
          build-args: |
            BUN_DEV_IMAGE=oven/bun:${{ env.BUN_VERSION }}-alpine
            NGINX_IMAGE=nginx:1.30.0-alpine
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

      - name: Build migrate image (fallback)
        if: steps.dhi.outputs.enabled != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile.migrate
          pull: true
          load: true
          tags: chat-app-migrate:latest
          build-args: |
            BUN_DEV_IMAGE=oven/bun:${{ env.BUN_VERSION }}-alpine
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,scope=migrate,mode=max

      - name: Validate Docker Compose
        run: |
          set -euo pipefail
          docker compose config --quiet
          echo "Docker Compose configuration is valid"
