name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.12

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint code
        run: bun run lint

      - name: Run Knip
        run: bun run knip

      - name: Type check
        run: |
          set -euo pipefail
          (cd client && bunx tsc --noEmit)
          (cd server && bunx tsc --noEmit)

      - name: Run tests
        run: |
          set -euo pipefail
          (cd client && bun run test)
          (cd server && bun run test)

  validate-kubernetes:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          SERVER_PORT=3000
          NODE_ENV=production
          LOG_LEVEL=info
          DB_PASSWORD=postgres
          DB_USER=postgres
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=chatapp
          DB_URL=postgres://postgres:postgres@db:5432/chatapp
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_AUTH=redis_password
          REDIS_URL=redis://:redis_password@redis:6379
          OPENAI_API_KEY=test-openai-key
          SERPER_API_KEY=
          LANGFUSE_SECRET_KEY=
          LANGFUSE_PUBLIC_KEY=
          LANGFUSE_BASEURL=
          JWT_SECRET=test_secret_min_32_characters_long
          CLIENT_URL=http://localhost
          BASE_API_SLUG=api
          VITE_API_URL=/api
          VITE_DEV_MODE=false
          VITE_APP_NAME=Chat App
          VITE_APP_VERSION=1.0.0
          DOMAIN=localhost
          TRAEFIK_LOG_LEVEL=INFO
          EOF

      - name: Validate Kubernetes chart
        run: bun run k8s:validate

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build client and report asset sizes
        run: cd client && bun run build:report

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build check (no explicit build for Bun)
        run: cd server && bunx tsc --noEmit

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [build-client, build-server, validate-kubernetes]
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          SERVER_PORT=3000
          NODE_ENV=production
          LOG_LEVEL=info
          DB_PASSWORD=postgres
          DB_USER=postgres
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=chatapp
          DB_URL=postgres://postgres:postgres@db:5432/chatapp
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_AUTH=redis_password
          REDIS_URL=redis://:redis_password@redis:6379
          OPENAI_API_KEY=test-openai-key
          SERPER_API_KEY=
          LANGFUSE_SECRET_KEY=
          LANGFUSE_PUBLIC_KEY=
          LANGFUSE_BASEURL=
          JWT_SECRET=test_secret_min_32_characters_long
          CLIENT_URL=http://localhost
          BASE_API_SLUG=api
          VITE_API_URL=/api
          VITE_DEV_MODE=false
          VITE_APP_NAME=Chat App
          VITE_APP_VERSION=1.0.0
          DOMAIN=localhost
          TRAEFIK_LOG_LEVEL=INFO
          EOF

      - name: Detect DHI credentials
        id: dhi
        run: |
          set -euo pipefail
          if [ -n "${DOCKER_USERNAME:-}" ] && [ -n "${DOCKER_PASSWORD:-}" ]; then
            echo "::add-mask::${DOCKER_USERNAME}"
            echo "::add-mask::${DOCKER_PASSWORD}"
            {
              echo "enabled=true"
              echo "username=${DOCKER_USERNAME}"
              echo "password=${DOCKER_PASSWORD}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to DHI registry
        if: steps.dhi.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ steps.dhi.outputs.username }}
          password: ${{ steps.dhi.outputs.password }}

      - name: Build server image (DHI)
        if: steps.dhi.outputs.enabled == 'true'
        run: docker build -t chat-app-server:latest --target server-prod .

      - name: Build client image (DHI)
        if: steps.dhi.outputs.enabled == 'true'
        run: docker build -t chat-app-client:latest --target client-prod .

      - name: Build migrate image (DHI)
        if: steps.dhi.outputs.enabled == 'true'
        run: docker build -t chat-app-migrate:latest -f server/Dockerfile.migrate .

      - name: Build server image (fallback)
        if: steps.dhi.outputs.enabled != 'true'
        run: docker build -t chat-app-server:latest --target server-prod --build-arg BUN_DEV_IMAGE=oven/bun:1-alpine --build-arg BUN_RUNTIME_IMAGE=oven/bun:1-alpine .

      - name: Build client image (fallback)
        if: steps.dhi.outputs.enabled != 'true'
        run: docker build -t chat-app-client:latest --target client-prod --build-arg BUN_DEV_IMAGE=oven/bun:1-alpine --build-arg NGINX_IMAGE=nginx:1.29-alpine .

      - name: Build migrate image (fallback)
        if: steps.dhi.outputs.enabled != 'true'
        run: docker build -t chat-app-migrate:latest -f server/Dockerfile.migrate --build-arg BUN_DEV_IMAGE=oven/bun:1-alpine .

      - name: Validate Docker Compose
        run: |
          set -euo pipefail
          docker compose config > /dev/null
          echo "Docker Compose configuration is valid"
