apiVersion: batch/v1
kind: Job
metadata:
  name: migration
  namespace: {{ .Values.namespace | quote }}
  labels:
    app.kubernetes.io/name: chat-app
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat-app
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: {{ .Values.images.migrate }}
          imagePullPolicy: {{ .Values.imagePullPolicy.app }}
          envFrom:
            - configMapRef:
                name: env
            - secretRef:
                name: app-secrets
            - secretRef:
                name: azure-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
