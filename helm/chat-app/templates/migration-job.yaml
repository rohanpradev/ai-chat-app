{{- if .Values.migration.enabled }}
{{- $appSecretName := .Values.secrets.app.existingSecret | default (printf "%s-app-secrets" (include "chat-app.fullname" .)) -}}
{{- $configMapName := printf "%s-env" (include "chat-app.fullname" .) -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "migration") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  {{- if .Values.migration.useHook }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  {{- end }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "chat-app.componentLabels" (dict "root" . "component" "migration") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.secrets.create (not .Values.secrets.app.existingSecret) }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.migration.podSecurityContext | nindent 8 }}
      containers:
        - name: migration
          image: {{ include "chat-app.image" .Values.images.migrate | quote }}
          imagePullPolicy: {{ .Values.images.migrate.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ $configMapName }}
            - secretRef:
                name: {{ $appSecretName }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.migration.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
