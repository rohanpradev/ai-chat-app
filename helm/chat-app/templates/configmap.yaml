apiVersion: v1
kind: ConfigMap
metadata:
  name: env
  namespace: {{ .Values.namespace | quote }}
  labels:
    io.kompose.service: client-env
    {{- include "chat-app.labels" . | nindent 4 }}
data:
  ACME_EMAIL: {{ .Values.env.ACME_EMAIL | quote }}
  BASE_API_SLUG: {{ .Values.env.BASE_API_SLUG | quote }}
  CLIENT_URL: {{ .Values.env.CLIENT_URL | quote }}
  DB_HOST: {{ .Values.env.DB_HOST | quote }}
  DB_NAME: {{ .Values.env.DB_NAME | quote }}
  DB_PORT: {{ .Values.env.DB_PORT | quote }}
  DB_USER: {{ .Values.env.DB_USER | quote }}
  DOMAIN: {{ .Values.env.DOMAIN | quote }}
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
  NODE_ENV: {{ .Values.env.NODE_ENV | quote }}
  REDIS_HOST: {{ .Values.env.REDIS_HOST | quote }}
  REDIS_PORT: {{ .Values.env.REDIS_PORT | quote }}
  REDIS_URL: {{ .Values.env.REDIS_URL | quote }}
  SERVER_HOST: {{ .Values.env.SERVER_HOST | quote }}
  SERVER_PORT: {{ .Values.env.SERVER_PORT | quote }}
  TRAEFIK_LOG_LEVEL: {{ .Values.env.TRAEFIK_LOG_LEVEL | quote }}
  VITE_API_URL: {{ .Values.env.VITE_API_URL | quote }}
  VITE_APP_NAME: {{ .Values.env.VITE_APP_NAME | quote }}
  VITE_APP_VERSION: {{ .Values.env.VITE_APP_VERSION | quote }}
  VITE_DEV_MODE: {{ .Values.env.VITE_DEV_MODE | quote }}
  CORS_ORIGINS: {{ .Values.env.CORS_ORIGINS | quote }}
