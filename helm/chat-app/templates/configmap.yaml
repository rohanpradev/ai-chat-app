apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chat-app.fullname" . }}-env
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
data:
  BASE_API_SLUG: {{ .Values.config.env.BASE_API_SLUG | quote }}
  CLIENT_URL: {{ .Values.config.env.CLIENT_URL | quote }}
  CORS_ORIGINS: {{ .Values.config.env.CORS_ORIGINS | quote }}
  DB_HOST: {{ include "chat-app.componentName" (dict "root" . "component" "db") | quote }}
  DB_NAME: {{ .Values.config.env.DB_NAME | quote }}
  DB_PORT: {{ .Values.config.env.DB_PORT | quote }}
  DB_USER: {{ .Values.config.env.DB_USER | quote }}
  DOMAIN: {{ .Values.config.env.DOMAIN | quote }}
  LOG_LEVEL: {{ .Values.config.env.LOG_LEVEL | quote }}
  NODE_ENV: {{ .Values.config.env.NODE_ENV | quote }}
  REDIS_HOST: {{ include "chat-app.componentName" (dict "root" . "component" "redis") | quote }}
  REDIS_PORT: {{ .Values.config.env.REDIS_PORT | quote }}
  SERVER_HOST: {{ printf "%s.%s.svc.cluster.local" (include "chat-app.componentName" (dict "root" . "component" "server")) .Release.Namespace | quote }}
  SERVER_PORT: {{ .Values.config.env.SERVER_PORT | quote }}
  TRAEFIK_LOG_LEVEL: {{ .Values.config.env.TRAEFIK_LOG_LEVEL | quote }}
  VITE_API_URL: {{ .Values.config.env.VITE_API_URL | quote }}
  VITE_APP_NAME: {{ .Values.config.env.VITE_APP_NAME | quote }}
  VITE_APP_VERSION: {{ .Values.config.env.VITE_APP_VERSION | quote }}
  VITE_DEV_MODE: {{ .Values.config.env.VITE_DEV_MODE | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chat-app.fullname" . }}-client-nginx
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        server_tokens off;
        charset utf-8;

        root /app/static;
        index index.html;
        client_max_body_size 25m;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:;" always;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml+rss
            application/atom+xml
            image/svg+xml;

        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }

        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        location ~ ^/{{ .Values.config.env.BASE_API_SLUG }}/ai/.*-stream$ {
            gzip off;
            proxy_pass http://{{ printf "%s.%s.svc.cluster.local" (include "chat-app.componentName" (dict "root" . "component" "server")) .Release.Namespace }}:{{ .Values.config.env.SERVER_PORT }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_set_header Cookie $http_cookie;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_set_header Connection "";
            proxy_cache off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        location /{{ .Values.config.env.BASE_API_SLUG }}/ {
            proxy_pass http://{{ printf "%s.%s.svc.cluster.local" (include "chat-app.componentName" (dict "root" . "component" "server")) .Release.Namespace }}:{{ .Values.config.env.SERVER_PORT }}/{{ .Values.config.env.BASE_API_SLUG }}/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_set_header Cookie $http_cookie;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            proxy_redirect off;
            proxy_intercept_errors on;
            error_page 502 503 504 /api_error.html;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location = /api_error.html {
            root /app/static;
            internal;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(aspx|php|jsp|cgi)$ {
            return 410;
        }
    }
