apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chat-app.fullname" . }}-env
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
data:
  BASE_API_SLUG: {{ .Values.config.env.BASE_API_SLUG | quote }}
  CLIENT_URL: {{ .Values.config.env.CLIENT_URL | quote }}
  CORS_ORIGINS: {{ .Values.config.env.CORS_ORIGINS | quote }}
  DB_HOST: {{ include "chat-app.componentName" (dict "root" . "component" "db") | quote }}
  DB_NAME: {{ .Values.config.env.DB_NAME | quote }}
  DB_PORT: {{ .Values.config.env.DB_PORT | quote }}
  DB_USER: {{ .Values.config.env.DB_USER | quote }}
  DOMAIN: {{ .Values.config.env.DOMAIN | quote }}
  LOG_LEVEL: {{ .Values.config.env.LOG_LEVEL | quote }}
  NODE_ENV: {{ .Values.config.env.NODE_ENV | quote }}
  REDIS_HOST: {{ include "chat-app.componentName" (dict "root" . "component" "redis") | quote }}
  REDIS_PORT: {{ .Values.config.env.REDIS_PORT | quote }}
  SERVER_HOST: {{ printf "%s.%s.svc.cluster.local" (include "chat-app.componentName" (dict "root" . "component" "server")) .Release.Namespace | quote }}
  SERVER_PORT: {{ .Values.config.env.SERVER_PORT | quote }}
  TRAEFIK_LOG_LEVEL: {{ .Values.config.env.TRAEFIK_LOG_LEVEL | quote }}
  VITE_API_URL: {{ .Values.config.env.VITE_API_URL | quote }}
  VITE_APP_NAME: {{ .Values.config.env.VITE_APP_NAME | quote }}
  VITE_APP_VERSION: {{ .Values.config.env.VITE_APP_VERSION | quote }}
  VITE_DEV_MODE: {{ .Values.config.env.VITE_DEV_MODE | quote }}
  VITE_SENTRY_DSN: {{ .Values.config.env.VITE_SENTRY_DSN | quote }}
  VITE_SENTRY_ENVIRONMENT: {{ .Values.config.env.VITE_SENTRY_ENVIRONMENT | quote }}
  VITE_SENTRY_RELEASE: {{ .Values.config.env.VITE_SENTRY_RELEASE | quote }}
  VITE_SENTRY_TRACES_SAMPLE_RATE: {{ .Values.config.env.VITE_SENTRY_TRACES_SAMPLE_RATE | quote }}
  VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: {{ .Values.config.env.VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE | quote }}
  VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: {{ .Values.config.env.VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE | quote }}
  SENTRY_ENVIRONMENT: {{ .Values.config.env.SENTRY_ENVIRONMENT | quote }}
  SENTRY_RELEASE: {{ .Values.config.env.SENTRY_RELEASE | quote }}
  SENTRY_TRACES_SAMPLE_RATE: {{ .Values.config.env.SENTRY_TRACES_SAMPLE_RATE | quote }}
  SENTRY_SEND_DEFAULT_PII: {{ .Values.config.env.SENTRY_SEND_DEFAULT_PII | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chat-app.fullname" . }}-client-nginx
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        server_name localhost;
        server_tokens off;
        charset utf-8;

        root /app/static;
        index index.html;
        client_max_body_size 25m;
        client_body_timeout 15s;
        client_header_timeout 15s;
        client_body_buffer_size 1m;
        large_client_header_buffers 4 16k;
        keepalive_timeout 65s;
        send_timeout 60s;
        reset_timedout_connection on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; frame-src 'self' blob:; media-src 'self' data: blob:; manifest-src 'self'" always;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml
            application/xml+rss
            application/atom+xml
            image/svg+xml;

        gzip_static on;

        location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; frame-src 'self' blob:; media-src 'self' data: blob:; manifest-src 'self'" always;
            access_log off;
            try_files $uri =404;
        }

        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; frame-src 'self' blob:; media-src 'self' data: blob:; manifest-src 'self'" always;
            try_files /index.html =404;
        }

        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; frame-src 'self' blob:; media-src 'self' data: blob:; manifest-src 'self'" always;
            try_files $uri =404;
        }

        location ~ ^/{{ .Values.config.env.BASE_API_SLUG }}/ai/.*-stream$ {
            gzip off;
            proxy_pass http://{{ printf "%s.%s.svc.cluster.local" (include "chat-app.componentName" (dict "root" . "component" "server")) .Release.Namespace }}:{{ .Values.config.env.SERVER_PORT }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Prefix "/{{ .Values.config.env.BASE_API_SLUG }}";
            proxy_set_header X-Request-ID $request_id;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Accept-Encoding "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_hide_header X-Powered-By;
            proxy_set_header Connection "";
            proxy_cache off;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            proxy_intercept_errors off;
            proxy_connect_timeout 30s;
            add_header X-Accel-Buffering "no" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header X-Permitted-Cross-Domain-Policies "none" always;
            add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; worker-src 'self' blob:; frame-src 'self' blob:; media-src 'self' data: blob:; manifest-src 'self'" always;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        location /{{ .Values.config.env.BASE_API_SLUG }}/ {
            proxy_pass http://{{ printf "%s.%s.svc.cluster.local" (include "chat-app.componentName" (dict "root" . "component" "server")) .Release.Namespace }}:{{ .Values.config.env.SERVER_PORT }};
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Prefix "/{{ .Values.config.env.BASE_API_SLUG }}";
            proxy_set_header X-Request-ID $request_id;
            proxy_pass_header Set-Cookie;
            proxy_pass_header Cookie;
            proxy_set_header Cookie $http_cookie;
            proxy_hide_header X-Powered-By;
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_request_buffering on;
            proxy_cache off;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            proxy_redirect off;
            proxy_intercept_errors off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /health {
            access_log off;
            add_header Content-Type text/plain always;
            return 200 "healthy\n";
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(aspx|php|jsp|cgi)$ {
            return 410;
        }
    }
