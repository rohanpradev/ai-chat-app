{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-app.fullname" . }}-default-deny
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "chat-app.name" . }}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-app.fullname" . }}-allow-dns
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: {{ include "chat-app.name" . }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dns.namespace | quote }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.podLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-app.fullname" . }}-server
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "client") | nindent 14 }}
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  {{- toYaml .Values.networkPolicy.gatewayNamespaces | nindent 18 }}
      ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "db") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.db.service.port }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "redis") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.redis.service.port }}
    {{- if .Values.networkPolicy.allowInternetEgressForServer }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-app.fullname" . }}-client
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "client") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  {{- toYaml .Values.networkPolicy.gatewayNamespaces | nindent 18 }}
      ports:
        - protocol: TCP
          port: {{ .Values.client.service.port }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.server.service.port }}
    {{- if .Values.networkPolicy.allowInternetEgressForClient }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- if .Values.db.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-app.fullname" . }}-db
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "db") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "migration") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.db.service.port }}
{{- end }}
{{- if .Values.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-app.fullname" . }}-redis
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "redis") | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.redis.service.port }}
{{- end }}
{{- if .Values.migration.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chat-app.fullname" . }}-migration
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "migration") | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "db") | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.db.service.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dns.namespace | quote }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dns.podLabels | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}
