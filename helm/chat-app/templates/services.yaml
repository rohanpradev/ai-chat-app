{{- if .Values.db.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "db") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  type: ClusterIP
  selector:
    {{- include "chat-app.componentLabels" (dict "root" . "component" "db") | nindent 4 }}
  ports:
    - name: postgres
      port: {{ .Values.db.service.port }}
      targetPort: postgres
{{- end }}
{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "redis") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "chat-app.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: redis
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "server") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.server.service.type }}
  selector:
    {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
      {{- if and (eq .Values.server.service.type "NodePort") .Values.server.service.nodePort }}
      nodePort: {{ .Values.server.service.nodePort }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "client") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  type: {{ .Values.client.service.type }}
  selector:
    {{- include "chat-app.componentLabels" (dict "root" . "component" "client") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.client.service.port }}
      targetPort: http
      {{- if and (eq .Values.client.service.type "NodePort") .Values.client.service.nodePort }}
      nodePort: {{ .Values.client.service.nodePort }}
      {{- end }}
