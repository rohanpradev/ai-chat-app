{{- $appSecretName := .Values.secrets.app.existingSecret | default (printf "%s-app-secrets" (include "chat-app.fullname" .)) -}}
{{- $configMapName := printf "%s-env" (include "chat-app.fullname" .) -}}
{{- $clientNginxConfigMapName := printf "%s-client-nginx" (include "chat-app.fullname" .) -}}
{{- if .Values.db.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "db") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "db") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chat-app.componentLabels" (dict "root" . "component" "db") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.secrets.create (not .Values.secrets.app.existingSecret) }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.db.terminationGracePeriodSeconds }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.db.podSecurityContext | nindent 8 }}
      containers:
        - name: db
          image: {{ include "chat-app.image" .Values.images.db | quote }}
          imagePullPolicy: {{ .Values.images.db.pullPolicy }}
          args:
            - -c
            - shared_buffers=256MB
            - -c
            - effective_cache_size=512MB
            - -c
            - maintenance_work_mem=128MB
            - -c
            - checkpoint_completion_target=0.7
            - -c
            - wal_buffers=16MB
            - -c
            - default_statistics_target=100
            - -c
            - random_page_cost=1.1
            - -c
            - effective_io_concurrency=200
            - -c
            - work_mem=8MB
            - -c
            - max_connections=100
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ $configMapName }}
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ $configMapName }}
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecretName }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_INITDB_ARGS
              value: --data-checksums --wal-segsize=64
          ports:
            - name: postgres
              containerPort: {{ .Values.db.service.port }}
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.db.resources.requests.cpu | quote }}
              memory: {{ .Values.db.resources.requests.memory | quote }}
              ephemeral-storage: {{ .Values.db.resources.requests.ephemeralStorage | quote }}
            limits:
              cpu: {{ .Values.db.resources.limits.cpu | quote }}
              memory: {{ .Values.db.resources.limits.memory | quote }}
              ephemeral-storage: {{ .Values.db.resources.limits.ephemeralStorage | quote }}
          securityContext:
            {{- toYaml .Values.db.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          {{- if .Values.db.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "chat-app.componentName" (dict "root" . "component" "db") }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
{{- if .Values.redis.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "redis") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chat-app.componentLabels" (dict "root" . "component" "redis") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.redis.terminationGracePeriodSeconds }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.redis.podSecurityContext | nindent 8 }}
      containers:
        - name: redis
          image: {{ include "chat-app.image" .Values.images.redis | quote }}
          imagePullPolicy: {{ .Values.images.redis.pullPolicy }}
          env:
            - name: REDIS_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecretName }}
                  key: REDIS_AUTH
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecretName }}
                  key: REDIS_AUTH
          args:
            - redis-server
            - --requirepass
            - $(REDIS_AUTH)
            - --appendonly
            - "yes"
            - --appendfsync
            - everysec
            - --auto-aof-rewrite-percentage
            - "100"
            - --auto-aof-rewrite-min-size
            - 64mb
            - --maxmemory
            - 512mb
            - --maxmemory-policy
            - allkeys-lru
            - --tcp-keepalive
            - "300"
            - --timeout
            - "0"
            - --save
            - "900"
            - "1"
            - "300"
            - "10"
            - "60"
            - "10000"
          ports:
            - name: redis
              containerPort: {{ .Values.redis.service.port }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.redis.resources.requests.cpu | quote }}
              memory: {{ .Values.redis.resources.requests.memory | quote }}
              ephemeral-storage: {{ .Values.redis.resources.requests.ephemeralStorage | quote }}
            limits:
              cpu: {{ .Values.redis.resources.limits.cpu | quote }}
              memory: {{ .Values.redis.resources.limits.memory | quote }}
              ephemeral-storage: {{ .Values.redis.resources.limits.ephemeralStorage | quote }}
          securityContext:
            {{- toYaml .Values.redis.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.redis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "chat-app.componentName" (dict "root" . "component" "redis") }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "server") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  revisionHistoryLimit: {{ .Values.server.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.server.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.secrets.create (not .Values.secrets.app.existingSecret) }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.server.terminationGracePeriodSeconds }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.server.podSecurityContext | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 20 }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.server.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.server.topologySpreadConstraints.maxSkew }}
          topologyKey: {{ .Values.server.topologySpreadConstraints.topologyKey | quote }}
          whenUnsatisfiable: {{ .Values.server.topologySpreadConstraints.whenUnsatisfiable | quote }}
          labelSelector:
            matchLabels:
              {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 14 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "chat-app.image" .Values.images.server | quote }}
          imagePullPolicy: {{ .Values.images.server.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ $configMapName }}
            - secretRef:
                name: {{ $appSecretName }}
          ports:
            - name: http
              containerPort: {{ .Values.server.service.port }}
          startupProbe:
            {{- toYaml .Values.server.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.server.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.server.livenessProbe | nindent 12 }}
          resources:
            requests:
              cpu: {{ .Values.server.resources.requests.cpu | quote }}
              memory: {{ .Values.server.resources.requests.memory | quote }}
              ephemeral-storage: {{ .Values.server.resources.requests.ephemeralStorage | quote }}
            limits:
              cpu: {{ .Values.server.resources.limits.cpu | quote }}
              memory: {{ .Values.server.resources.limits.memory | quote }}
              ephemeral-storage: {{ .Values.server.resources.limits.ephemeralStorage | quote }}
          securityContext:
            {{- toYaml .Values.server.securityContext | nindent 12 }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: uploads
          {{- if .Values.server.persistence.uploads.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "chat-app.componentName" (dict "root" . "component" "server") }}-uploads
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: logs
          {{- if .Values.server.persistence.logs.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "chat-app.componentName" (dict "root" . "component" "server") }}-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
---
