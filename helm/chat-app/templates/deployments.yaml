              mountPath: /run/nginx
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: {{ $clientNginxConfigMapName }}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
