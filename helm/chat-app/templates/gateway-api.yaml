{{- $gatewayEnabled := and .Values.exposure.gateway.enabled (.Capabilities.APIVersions.Has "gateway.networking.k8s.io/v1") -}}
{{- $middlewareCRDAvailable := .Capabilities.APIVersions.Has "traefik.io/v1alpha1/Middleware" -}}
{{- $gatewaySectionName := ternary "websecure" "web" .Values.exposure.gateway.tls.enabled -}}
{{- if $gatewayEnabled }}
{{- if .Values.exposure.gateway.create }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.exposure.gateway.name }}
  namespace: {{ .Values.exposure.gateway.namespace }}
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: gateway
spec:
  gatewayClassName: {{ .Values.exposure.gateway.className }}
  listeners:
    - name: web
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: websecure
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      {{- if .Values.exposure.gateway.tls.enabled }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.exposure.gateway.tls.secretName }}
            namespace: {{ .Values.exposure.gateway.namespace }}
      {{- end }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "client") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  parentRefs:
    - name: {{ .Values.exposure.gateway.name }}
      namespace: {{ .Values.exposure.gateway.namespace }}
      sectionName: {{ $gatewaySectionName }}
  hostnames:
    {{- range .Values.exposure.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      {{- if and .Values.exposure.gateway.createMiddlewares $middlewareCRDAvailable }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "chat-app.fullname" . }}-security-headers
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "chat-app.fullname" . }}-compress
      {{- end }}
      backendRefs:
        - name: {{ include "chat-app.componentName" (dict "root" . "component" "client") }}
          port: {{ .Values.client.service.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "server") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  parentRefs:
    - name: {{ .Values.exposure.gateway.name }}
      namespace: {{ .Values.exposure.gateway.namespace }}
      sectionName: {{ $gatewaySectionName }}
  hostnames:
    {{- range .Values.exposure.gateway.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      {{- if and .Values.exposure.gateway.createMiddlewares $middlewareCRDAvailable }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "chat-app.fullname" . }}-security-headers
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "chat-app.fullname" . }}-api-cors
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "chat-app.fullname" . }}-api-ratelimit
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ include "chat-app.fullname" . }}-compress
      {{- end }}
      backendRefs:
        - name: {{ include "chat-app.componentName" (dict "root" . "component" "server") }}
          port: {{ .Values.server.service.port }}
{{- end }}
{{- if and $gatewayEnabled .Values.exposure.gateway.createMiddlewares $middlewareCRDAvailable }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chat-app.fullname" . }}-security-headers
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  headers:
    frameDeny: true
    sslRedirect: true
    browserXssFilter: true
    contentTypeNosniff: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    referrerPolicy: strict-origin-when-cross-origin
    permissionsPolicy: camera=(), microphone=(), geolocation=(), interest-cohort=()
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chat-app.fullname" . }}-compress
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  compress: {}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chat-app.fullname" . }}-api-cors
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  headers:
    accessControlAllowMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    accessControlAllowHeaders: ["*"]
    accessControlAllowOriginList:
      {{- range .Values.exposure.gateway.cors.allowOrigins }}
      - {{ . | quote }}
      {{- end }}
    accessControlAllowCredentials: true
    accessControlMaxAge: 86400
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chat-app.fullname" . }}-api-ratelimit
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
spec:
  rateLimit:
    average: {{ .Values.exposure.gateway.rateLimit.average }}
    burst: {{ .Values.exposure.gateway.rateLimit.burst }}
    period: {{ .Values.exposure.gateway.rateLimit.period }}
{{- end }}
