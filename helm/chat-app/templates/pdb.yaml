{{- $supportsUnhealthyPodEvictionPolicy := semverCompare ">=1.31-0" .Capabilities.KubeVersion.Version -}}
{{- if .Values.server.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "server") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  minAvailable: {{ .Values.server.pdb.minAvailable }}
  {{- if and $supportsUnhealthyPodEvictionPolicy .Values.server.pdb.unhealthyPodEvictionPolicy }}
  unhealthyPodEvictionPolicy: {{ .Values.server.pdb.unhealthyPodEvictionPolicy }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "server") | nindent 6 }}
{{- end }}
{{- if .Values.client.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "client") }}
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  minAvailable: {{ .Values.client.pdb.minAvailable }}
  {{- if and $supportsUnhealthyPodEvictionPolicy .Values.client.pdb.unhealthyPodEvictionPolicy }}
  unhealthyPodEvictionPolicy: {{ .Values.client.pdb.unhealthyPodEvictionPolicy }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chat-app.componentLabels" (dict "root" . "component" "client") | nindent 6 }}
{{- end }}
