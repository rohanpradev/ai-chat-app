{{- if and .Values.db.enabled .Values.db.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "chat-app.componentName" (dict "root" . "component" "db") }}-data
  labels:
    {{- include "chat-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  accessModes:
    {{- toYaml .Values.db.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.db.persistence.size }}
  {{- if .Values.db.persistence.storageClassName }}
  storageClassName: {{ .Values.db.persistence.storageClassName }}
  {{- end }}
{{- end }}
