# SonarQube Configuration
sonar.projectKey=ai-chat-app
sonar.projectName=AI Chat App
sonar.projectVersion=1.0

# Source directories
sonar.sources=client/src,server/src,shared
sonar.tests=client/src,server/src

# Language settings
sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info
sonar.typescript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

# Test patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.d.ts,**/coverage/**,**/.next/**

# Code coverage
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/types/**,**/*.d.ts

# Quality gate
sonar.qualitygate.wait=true

# Duplication
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx

# Language-specific settings
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx