sonar.projectName=AI Chat App

sonar.sources=client/src,server/src,shared
sonar.tests=client/src,server/src

sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info
sonar.typescript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.scannerwork/**,**/*.d.ts,**/coverage/**,**/.next/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.gen.ts,**/*.gen.tsx,**/__generated__/**,**/generated/**,**/routeTree.gen.ts,client/src/test/**,client/src/components/ai-elements/**/*,client/src/components/ui/**/*,client/src/components/theme-provider.tsx,client/src/hooks/use-mobile.ts,client/src/reportWebVitals.ts,client/src/styles.css
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/types/**,**/*.d.ts,**/*.gen.ts,**/*.gen.tsx,**/__generated__/**,**/generated/**,**/routeTree.gen.ts,client/src/test/**,client/src/components/ai-elements/**/*,client/src/components/ui/**/*,client/src/components/chat/**,client/src/composables/**,client/src/queries/**,client/src/lib/auth.tsx,client/src/routes/__root.tsx,client/src/routes/chat/$conversationId.tsx,client/src/components/theme-provider.tsx,client/src/hooks/use-mobile.ts,client/src/reportWebVitals.ts,client/src/styles.css

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx

sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx
