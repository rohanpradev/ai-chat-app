# Traefik v3.6 Helm Chart Values for Chat App

# Configure Network Ports and EntryPoints
ports:
  web:
    port: 80
    nodePort: 30000
    # HTTP to HTTPS redirect is now handled at entrypoint level
  websecure:
    port: 443
    nodePort: 30001
    http:
      tls: true

# Additional Arguments for Traefik
additionalArguments:
  # HTTP to HTTPS redirect
  - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
  - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
  - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
  
  # Let's Encrypt configuration
  - "--certificatesresolvers.letsencrypt.acme.email=your-email@example.com"
  - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
  - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"

# Dashboard Configuration
api:
  dashboard: true
  insecure: false

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.docker.localhost`)
    entryPoints:
      - websecure
    tls:
      certResolver: letsencrypt
    middlewares:
      - name: dashboard-auth

# Dashboard Authentication
extraObjects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: dashboard-auth-secret
      namespace: traefik
    type: kubernetes.io/basic-auth
    stringData:
      username: admin
      password: "P@ssw0rd"  # Change this in production!
  
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: dashboard-auth
      namespace: traefik
    spec:
      basicAuth:
        secret: dashboard-auth-secret

# Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

podSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true

# Disable Ingress Class (using Gateway API)
ingressClass:
  enabled: false

# Providers Configuration
providers:
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true

# Gateway Listeners
gateway:
  enabled: true
  name: traefik-gateway
  namespace: traefik
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All
    websecure:
      port: 443
      protocol: HTTPS
      namespacePolicy:
        from: All
      mode: Terminate
      certificateRefs:
        - kind: Secret
          name: local-selfsigned-tls
          group: ""
          namespace: traefik

# Persistence for ACME certificates
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 128Mi
  path: /data

# Observability
logs:
  general:
    level: INFO
  access:
    enabled: true

# Metrics
metrics:
  prometheus:
    enabled: true
    addRoutersLabels: true
    addServicesLabels: true
    addEntryPointsLabels: true

# Resource Limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Health Checks
readinessProbe:
  httpGet:
    path: /ping
    port: 9000
  initialDelaySeconds: 5
  periodSeconds: 5

livenessProbe:
  httpGet:
    path: /ping
    port: 9000
  initialDelaySeconds: 10
  periodSeconds: 10

