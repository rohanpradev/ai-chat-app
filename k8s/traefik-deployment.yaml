apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: traefik
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: chat-app
    app.kubernetes.io/version: "3.6"
  name: traefik
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: traefik
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        io.kompose.service: traefik
        app.kubernetes.io/name: traefik
        app.kubernetes.io/component: ingress
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - args:
            # Kubernetes Provider
            - --providers.kubernetesingress=false
            - --providers.kubernetesgateway=true
            
            # Entrypoints
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entrypoints.websecure.http.tls=true
            
            # HTTP to HTTPS redirect
            - --entrypoints.web.http.redirections.entryPoint.to=websecure
            - --entrypoints.web.http.redirections.entryPoint.scheme=https
            
            # API and Dashboard
            - --api.dashboard=true
            - --api.insecure=false
            
            # Let's Encrypt
            - --certificatesresolvers.letsencrypt.acme.email=your_email@example.com
            - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
            - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
            
            # Logging
            - --log.level=INFO
            - --accesslog=true
            
            # Metrics
            - --metrics.prometheus=true
            - --metrics.prometheus.addentrypointslabels=true
            - --metrics.prometheus.addserviceslabels=true
            - --metrics.prometheus.addrouterslabels=true
            
            # Ping
            - --ping=true
          envFrom:
            - configMapRef:
                name: env
          image: traefik:v3.6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
          livenessProbe:
            exec:
              command:
                - traefik
                - healthcheck
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          name: chat-app-traefik
          ports:
            - containerPort: 80
              protocol: TCP
              name: web
            - containerPort: 443
              protocol: TCP
              name: websecure
            - containerPort: 8080
              protocol: TCP
              name: traefik
          volumeMounts:
            - mountPath: /letsencrypt
              name: traefik-acme
            - mountPath: /var/log/traefik
              name: traefik-logs
            - mountPath: /tmp
              name: tmp
          resources:
            limits:
              memory: 512Mi
              cpu: 500m
            requests:
              memory: 256Mi
              cpu: 100m
      restartPolicy: Always
      serviceAccountName: traefik
      volumes:
        - name: traefik-acme
          persistentVolumeClaim:
            claimName: traefik-acme
        - name: traefik-logs
          persistentVolumeClaim:
            claimName: traefik-logs
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik
rules:
  - apiGroups:
      - ""
    resources:
      - services
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
      - httproutes
      - referencegrants
      - tcproutes
      - tlsroutes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways/status
      - httproutes/status
      - tcproutes/status
      - tlsroutes/status
    verbs:
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: default
