apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-chat-config
  namespace: ai-chat-app
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  SERVER_PORT: "3000"
  BASE_API_SLUG: "api"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "chatapp"
  DB_USER: "postgres"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  LANGFUSE_URL: "https://cloud.langfuse.com"
  LANGFUSE_HOST: "https://cloud.langfuse.com"
  TELEMETRY_ENABLED: "true"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"